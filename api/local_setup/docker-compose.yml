version: "3.8"
services:
  agent-database:
    image: postgres:16-alpine
    container_name: agent-database
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=agentAdmin
      - POSTGRES_DB=agent
    logging:
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - "5434:5432"
    volumes:
      - agent-database-data:/var/lib/postgresql/data

volumes:
  agent-database-data:
